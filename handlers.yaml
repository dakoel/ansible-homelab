---
- name: Stop docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ ansible_env.HOME }}/{{ inventory_hostname }}"
    state: stopped
  listen: Restart docker compose

- name: Start docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ ansible_env.HOME }}/{{ inventory_hostname }}"
    state: present
  listen: Restart docker compose
