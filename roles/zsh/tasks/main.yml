---
- name: Install zsh
  apt:
    name: zsh
    state: present
    update_cache: yes
    cache_valid_time: 600

- name: Check if ~/.oh-my-zsh exists
  stat:
    path: ~/.oh-my-zsh
  register: oh_my_zsh_result

- name: Install oh-my-zsh
  shell: sh -c "$(wget https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh -O -)" "" --unattended --keep-zshrc
  when: not oh_my_zsh_result.stat.exists

- name: Set zsh as default shell
  shell: chsh -s /bin/zsh

- name: Enable vi keybinding
  lineinfile:
    path: ~/.zshrc
    line: bindkey -v
